    <title>Simplified Content - JavaScript Disabled</title>
    <style>
        /* Apply basic styling to the body for readability. */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        /* Style the main header. */
        h1 {
            color: #a00000;
        }
        /* Style the main message box. */
        .message {
            border: 1px solid #ccc;
            padding: 15px;
            background-color: #fff;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        /* Style the navigation list. */
        nav ul {
            list-style-type: none;
            padding: 0;
        }
        /* Style the individual navigation links. */
        nav ul li a {
            display: block;
            padding: 10px 0;
            text-decoration: none;
            color: #0066cc;
            border-bottom: 1px solid #eee;
        }
        /* Change link color on hover. */
        nav ul li a:hover {
            color: #004080;
        }
    </style>
</head>
<body>

    <h1>Simplified Website View</h1>

    <div class="message">
        <p>You are viewing a simplified version of this page because JavaScript is disabled in your browser settings or not supported.</p>
        <p>The full, interactive experience requires JavaScript. Please enable it or use the navigation below to access the core content.</p>
    </div>
