<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Study Mode</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use Inter font -->
   <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script type="module" src="deep_study.js"></script>
    <script>  tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                },
                // Custom keyframes for a slight button pulse effect
                keyframes: {
                    pulse: {
                        '0%, 100%': { transform: 'scale(1)' },
                        '50%': { transform: 'scale(1.01)' },
                    }
                },
                animation: {
                    pulse: 'pulse 1s ease-in-out infinite',
                }
            }
        }
    }</script>

    <!-- Custom style for the gradient text -->
    <style>
        .deep-study-gradient {
            background-image: linear-gradient(to right, #6366f1, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 font-sans">

<div id="quiz-container">
    <!-- Main Container Card -->
    <div class="w-full max-w-4xl bg-white shadow-xl rounded-2xl p-6 sm:p-10 border-t-2 border-b-2 border-x border-gray-100">

        <!-- Header: Deep Study Title (Increased bottom margin: mb-16) -->
        <h1 class="text-4xl sm:text-6xl font-extrabold text-center mb-16 deep-study-gradient">
            Deep Study
        </h1>

        <!-- Instruction Text (Increased bottom margin: mb-12) -->
        <p class="text-lg sm:text-2xl font-semibold text-gray-700 text-center mb-12">
            Select what to study:
        </p>

        <!-- Button Grid Container -->
        <div id="container" class="grid grid-cols-1 md:grid-cols-3 gap-4">

            <!-- Button 1: Answer (Smaller size and padding: h-32, p-4) -->
            <button id="answer" 
                    class="study-mode-button bg-white text-gray-800 border-2 border-indigo-400 p-4 h-32 rounded-xl shadow-md transition-all duration-300 hover:bg-indigo-50 hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-indigo-200">
                <div class="flex flex-col items-center justify-center">
                    <img src="https://via.placeholder.com/50/6366f1/FFFFFF?text=A" alt="Answer Icon" class="mb-1">
                    <span class="text-xl sm:text-2xl font-bold">Answer</span>
                    <span class="text-xs text-gray-500 mt-1">Focus on recalling the response.</span>
                </div>
            </button>

            <!-- Button 2: Question (Smaller size and padding: h-32, p-4) -->
            <button id="question" 
                    class="study-mode-button bg-white text-gray-800 border-2 border-blue-400 p-4 h-32 rounded-xl shadow-md transition-all duration-300 hover:bg-blue-50 hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-blue-200">
                <div class="flex flex-col items-center justify-center">
                    <img src="https://via.placeholder.com/50/3b82f6/FFFFFF?text=Q" alt="Question Icon" class="mb-1">
                    <span class="text-xl sm:text-2xl font-bold">Question</span>
                    <span class="text-xs text-gray-500 mt-1">Focus on identifying the prompt.</span>
                </div>
            </button>

            <!-- Button 3: Both (Smaller size and padding: h-32, p-4) -->
            <button id="both" 
                    class="study-mode-button bg-white text-gray-800 border-2 border-cyan-400 p-4 h-32 rounded-xl shadow-md transition-all duration-300 hover:bg-cyan-50 hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-cyan-200">
                <div class="flex flex-col items-center justify-center">
                    <span class="text-3xl sm:text-4xl font-extrabold mb-1"></span>
                    <span class="text-xl sm:text-2xl font-bold">Both</span>
                    <span class="text-xs text-gray-500 mt-1">Practice with full context.</span>
                </div>
            </button>
        </div>
        <div id="quiz-container"></div>
        <!-- Selection Output Message -->
        <div id="selectionOutput" class="hidden mt-8 text-center text-lg font-medium p-3 rounded-lg bg-green-100 text-green-700 transition duration-300">
            <!-- Selected mode will appear here -->
        </div>
    </div>
</div>
</body>
</html>
