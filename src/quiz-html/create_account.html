<!DOCTYPE html>
<<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Practice Quizzing - Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Font Awesome for better icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom styles to enhance the design */
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Modern Gradient Background (Same as log_in.html) */
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            padding: 1rem;
        }

        /* Enhanced Card Shadow for an 'App' look (Same as log_in.html) */
        .card-shadow {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 6px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }
        
        /* Interactive Card Hover Effect (Same as log_in.html) */
        .card-shadow:hover {
            transform: translateY(-2px);
        }

        /* Style for the main application title (Same as log_in.html) */
        .app-title {
            background-color: #3b82f6; /* Blue 500 */
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px; /* Fully rounded pill shape */
            display: inline-block;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.4);
            letter-spacing: 0.05em;
        }
        
        /* Specific styling for the password input container */
        .password-container {
            position: relative;
        }

        .password-container input {
            padding-right: 2.5rem; /* Make room for the eye icon */
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af; /* Gray 400 */
        }
    </style>
</head>

<body>

    <!-- Error Message Pop-up -->
    <div id="server-error-message"
        class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-semibold px-6 py-3 rounded-lg shadow-xl transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        <!-- Error message content will be inserted here -->
    </div>

    <!-- Main Authentication Card -->
    <div id="auth-card" class="card-shadow bg-white p-8 sm:p-10 rounded-xl w-full max-w-sm">
        <header class="text-center mb-8">
            <!-- App-like title styling -->
            <h1 class="text-3xl font-extrabold text-gray-800">
                <span class="app-title">Practice Quizzing</span>
            </h1>
        </header>
        
        <!-- Form for creating the account -->
        <form id="create-account-form" class="space-y-6">
            <h2 class="text-2xl font-semibold text-center text-gray-700">Create Account</h2>
            
            <!-- Username Input -->
            <input name="username" type="text" id="create-username" placeholder="Username" required
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">

            <!-- Email Input -->
            <input name="email" type="email" id="create-email" placeholder="Email Address" required
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">
            
            <!-- Password Input -->
            <div class="password-container">
                <input name="password" type="password" id="create-password" placeholder="Password" required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">
                <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('create-password', this)"></i>
            </div>
            
            <!-- Confirm Password Input -->
            <div class="password-container">
                <input name="cPassword" type="password" id="confirm-password" placeholder="Confirm Password" required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">
                <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('confirm-password', this)"></i>
            </div>

            <!-- Create Account Button -->
            <button type="submit" id="create-account-button"
                class="w-full bg-blue-600 text-white p-3 rounded-lg font-extrabold shadow-md hover:bg-blue-700 transition duration-200 transform hover:scale-[1.01] active:scale-[0.99]">
                Create Account
            </button>

            <!-- Link to Log In -->
            <a href="./log_in.html"
                class="text-sm text-center block text-blue-600 hover:text-blue-800 transition duration-150">
                Already have an account? Log In
            </a>
        </div>
        
    </form>
    
    <!-- Link to the frontend authentication script (moved to end of body for faster page load) -->
    <script src="./auth_scripts.js"></script>

</body>

</html>
